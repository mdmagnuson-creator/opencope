<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    
    <!-- Title gradient matching site -->
    <linearGradient id="title-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Subtle grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Decorative accent lines -->
  <line x1="100" y1="200" x2="300" y2="200" stroke="#ff6b35" stroke-width="3" opacity="0.6"/>
  <line x1="900" y1="430" x2="1100" y2="430" stroke="#ff6b35" stroke-width="3" opacity="0.6"/>
  
  <!-- Corner accents -->
  <rect x="50" y="50" width="80" height="4" fill="#ff6b35" opacity="0.8"/>
  <rect x="50" y="50" width="4" height="80" fill="#ff6b35" opacity="0.8"/>
  <rect x="1070" y="576" width="80" height="4" fill="#ff6b35" opacity="0.8"/>
  <rect x="1146" y="500" width="4" height="80" fill="#ff6b35" opacity="0.8"/>
  
  <!-- Main title -->
  <text x="600" y="280" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" 
        font-size="120" 
        font-weight="900" 
        fill="url(#title-gradient)" 
        text-anchor="middle"
        letter-spacing="-3">OpenCope</text>
  
  <!-- Tagline -->
  <text x="600" y="360" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" 
        font-size="32" 
        font-style="italic"
        fill="#666666" 
        text-anchor="middle">uncomfortable honesty in February 2026</text>
  
  <!-- Accent bar under tagline -->
  <rect x="450" y="390" width="300" height="3" fill="#ff6b35" opacity="0.8"/>
  
  <!-- Bottom subtle text -->
  <text x="600" y="550" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" 
        font-size="18" 
        fill="#444444" 
        text-anchor="middle"
        letter-spacing="4">CONFRONT THE COPE</text>
</svg>
