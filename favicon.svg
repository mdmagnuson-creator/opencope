<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg-grad)" stroke="#2a2a2a" stroke-width="1"/>
  
  <!-- Letter O with crack/break -->
  <text x="16" y="22" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="18" 
        font-weight="900" 
        fill="#e0e0e0" 
        text-anchor="middle">O</text>
  
  <!-- Crack/bandaid across the O - representing cope/denial -->
  <line x1="10" y1="12" x2="22" y2="20" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Small accent marks on the crack (like a bandaid pattern) -->
  <line x1="12" y1="14" x2="14" y2="12" stroke="#ff6b35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="18" x2="20" y2="16" stroke="#ff6b35" stroke-width="1.5" stroke-linecap="round"/>
</svg>
